name: Claude Issue Triage

on:
  issues:
    types: [opened, edited]

# Evita pagar dos ejecuciones si el issue se edita varias veces seguidas:
# cancela el triage en curso y deja solo el último.
concurrency:
  group: triage-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  triage:
    # Evita bucles: no reaccionar a acciones hechas por bots (incluido este workflow)
    if: github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Run Claude issue triage
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Acota vueltas y limita las herramientas a solo lo necesario para
          # triage. Aunque el cuerpo del issue intente inyectar instrucciones,
          # Claude no puede hacer nada más que leer y etiquetar/comentar.
          claude_args: |
            --max-turns 20
            --allowedTools "Read,Grep,Glob,Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh label list:*),Bash(git log:*),Bash(git diff:*)"
          prompt: |
            REPO: ${{ github.repository }}
            ISSUE NUMBER: ${{ github.event.issue.number }}

            Eres un asistente de triage de issues para este repositorio (un juego
            de Tetris clásico en JavaScript vanilla + HTML5 Canvas + CSS, sin
            dependencias ni build step).

            PASO 0 - Lee el issue y el contexto:
            - Obtén el título, el cuerpo y los comentarios existentes con:
                gh issue view ${{ github.event.issue.number }} --comments
              (No asumas el contenido: léelo desde ahí.)
            - Si existe CLAUDE.md o README.md, léelos para entender las reglas
              del juego y la arquitectura.
            - Revisa el código relevante (game.js, index.html, style.css) para
              fundamentar tu análisis.

            PASO 0.5 - Evita duplicados:
            - Si entre los comentarios ya hay uno tuyo que contiene el marcador
              <!-- claude-triage -->, significa que ya diste diagnóstico antes
              (esto pasa en eventos "edited"). En ese caso NO publiques un
              diagnóstico completo nuevo: como mucho ajusta los labels si cambió
              el sentido del issue y añade un comentario breve indicando qué
              cambió. Si nada relevante cambió, no hagas nada.

            Tu tarea tiene dos partes:

            ## 1. Asignar labels

            Los ÚNICOS labels que existen en este repositorio son:
            bug, documentation, duplicate, enhancement, good first issue,
            help wanted, invalid, question, wontfix

            Elige los que apliquen (puede ser más de uno, o ninguno si no aplica
            ninguno). NO crees labels nuevos bajo ninguna circunstancia. Aplica
            los labels elegidos con:
            gh issue edit ${{ github.event.issue.number }} --add-label "<label>"

            ## 2. Publicar diagnóstico

            Publica UN comentario en español con:
            gh issue comment ${{ github.event.issue.number }} --body "<diagnóstico>"

            El comentario debe tener esta estructura:
            - **Resumen**: qué está pidiendo o reportando el issue, en una o dos frases.
            - **Causa probable / hipótesis**: si es un bug, qué parte del código
              probablemente lo causa (cita funciones y archivos concretos, ej.
              `collide()`, `tryRotate()`, `loop()` en game.js). Si es una
              funcionalidad nueva, qué partes del código habría que tocar.
            - **Archivos y funciones involucrados**: lista concreta.
            - **Enfoque de solución propuesto**: pasos de alto nivel para
              implementar el fix o la feature (esto es insumo para el desarrollo
              posterior, no lo implementes tú).
            - **Información faltante**: si el issue está incompleto o ambiguo,
              pide aclaración aquí en vez de inventar suposiciones.

            IMPORTANTE: termina SIEMPRE el comentario con esta línea exacta, en
            una línea aparte, para poder detectar tu diagnóstico en el futuro:
            <!-- claude-triage -->

            Sé conciso, concreto y evita relleno. No hagas cambios de código en
            este paso.
