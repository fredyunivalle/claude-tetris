<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <button id="theme-toggle" type="button" aria-label="Cambiar a modo claro" title="Cambiar tema">🌙</button>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section records-panel">
          <span class="label">RECORDS</span>
          <ol id="highscores-list" class="highscores-list"></ol>
          <p class="stats-mini">
            <span>Combo max: <span id="best-combo-mini">0</span></span>
            <span>Líneas max: <span id="max-lines-mini">0</span></span>
          </p>
          <button id="reset-scores-btn" type="button" class="reset-btn">Resetear récords</button>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <div id="overlay-extra" class="overlay-extra hidden">
          <p id="overlay-stats" class="overlay-stats"></p>
          <div id="name-entry" class="name-entry hidden">
            <label for="player-name">¡Nuevo récord! Ingresa tu nombre:</label>
            <div class="name-entry-row">
              <input id="player-name" type="text" maxlength="10" placeholder="AAA" autocomplete="off" />
              <button id="save-score-btn" type="button">Guardar</button>
            </div>
          </div>
          <ol id="overlay-highscores" class="highscores-list"></ol>
        </div>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
